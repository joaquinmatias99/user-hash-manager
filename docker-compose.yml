version: '3.8'

services:
  mysql-db:
    image: mysql:8.0.33
    container_name: user-hash-mysql
    restart: always
    environment:
      MYSQL_DATABASE: user_hash_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_ROOT_PASSWORD: admin
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
    driver: local
